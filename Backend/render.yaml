services:
  - type: web
    name: pronoun-b2b-backend
    runtime: python
    region: singapore
    plan: pro
    rootDir: Backend
    buildCommand: "./build.sh"
    startCommand: "gunicorn core.wsgi:application --workers 2 --threads 2 --timeout 120 --bind 0.0.0.0:$PORT"
    healthCheckPath: /api/health/
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: SECRET_KEY
        sync: false
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        sync: false
      - key: ALLOWED_HOSTS
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false